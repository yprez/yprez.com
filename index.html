<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Yuri Prezument - Software Developer specializing in Python and backend systems">
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0f0f0f" media="(prefers-color-scheme: dark)">
    <title>Yuri Prezument - Software Developer</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        * {
            margin: 0;
        }

        :root {
            --bg-color: #e8e8e8;
            --text-color: #1a1a1a;
            --text-muted: #444444;
            --container-bg: #ffffff;
            --link-color: #2563eb;
            --link-hover: #1d4ed8;
            --accent-color: #2563eb;
            --border-color: rgba(0, 0, 0, 0.06);
            --shadow-color: rgba(0, 0, 0, 0.08);
            --shadow-color-strong: rgba(0, 0, 0, 0.12);
            --divider-color: #e5e5e5;
            --icon-color: #555555;
            --icon-hover: #1a1a1a;

            --font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-size-name: clamp(1.75rem, 4vw, 2.125rem);
            --font-size-title: clamp(1.0625rem, 2.5vw, 1.1875rem);
            --font-size-body: clamp(1rem, 1.5vw, 1.0625rem);
            --font-size-small: 0.9375rem;
            --font-weight-light: 300;
            --font-weight-regular: 400;
            --font-weight-medium: 500;
            --font-weight-semibold: 600;
            --letter-spacing-name: -0.02em;
            --letter-spacing-body: 0.01em;
            --letter-spacing-upper: 0.08em;
            --line-height-tight: 1.2;
            --line-height-normal: 1.6;
        }

        [data-theme="dark"] {
            --bg-color: #111111;
            --text-color: #e8e8e8;
            --text-muted: #bbbbbb;
            --container-bg: #1a1a1a;
            --link-color: #60a5fa;
            --link-hover: #93bbfd;
            --accent-color: #60a5fa;
            --border-color: rgba(255, 255, 255, 0.06);
            --shadow-color: rgba(0, 0, 0, 0.3);
            --shadow-color-strong: rgba(0, 0, 0, 0.5);
            --divider-color: #2a2a2a;
            --icon-color: #aaaaaa;
            --icon-hover: #e8e8e8;
        }

        :focus-visible {
            outline: 2px solid var(--accent-color);
            outline-offset: 2px;
        }

        :focus:not(:focus-visible) {
            outline: none;
        }

        body {
            font-family: var(--font-family);
            margin: 0;
            padding: 1rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh;
            transition: background-color 0.3s, color 0.3s;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            text-align: center;
            background-color: var(--container-bg);
            padding: 2rem 2.5rem;
            box-shadow:
                0 1px 3px var(--shadow-color),
                0 8px 24px var(--shadow-color),
                0 20px 48px var(--shadow-color-strong);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: background-color 0.3s, border-color 0.3s, box-shadow 0.3s;
            width: min(90vw, 480px);
            aspect-ratio: 1.586;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: card-enter 0.5s ease-out;
        }

        @keyframes card-enter {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .container {
                animation: none;
            }
        }

        .card__name {
            font-size: var(--font-size-name);
            font-weight: var(--font-weight-semibold);
            letter-spacing: var(--letter-spacing-name);
            line-height: var(--line-height-tight);
            margin: 0 0 0.25rem 0;
        }

        .card__title {
            font-size: var(--font-size-title);
            font-weight: var(--font-weight-light);
            letter-spacing: var(--letter-spacing-upper);
            color: var(--text-muted);
            margin: 0 0 1.5rem 0;
        }

        .card__divider {
            border: none;
            height: 2px;
            width: 2rem;
            background-color: var(--accent-color);
            margin: 0 auto 1.5rem auto;
            transition: background-color 0.3s;
        }

        .card__detail {
            font-size: var(--font-size-body);
            font-weight: var(--font-weight-regular);
            letter-spacing: var(--letter-spacing-body);
            line-height: var(--line-height-normal);
            color: var(--text-muted);
            margin: 0 0 0.5rem 0;
        }

        .card__detail:last-of-type {
            margin-bottom: 1.5rem;
        }

        .card__years-link {
            color: var(--text-muted);
            font-weight: var(--font-weight-regular);
            text-decoration: none;
            border-bottom: 1px dashed var(--text-muted);
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        .card__years-link:hover {
            border-bottom-color: var(--accent-color);
            color: var(--accent-color);
            text-decoration: none;
        }

        .card__links {
            display: flex;
            justify-content: center;
            gap: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .card__links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            color: var(--icon-color);
            transition: color 0.2s, background-color 0.2s, transform 0.2s;
            text-decoration: none;
        }

        .card__links a:hover {
            color: var(--icon-hover);
            background-color: var(--border-color);
            transform: translateY(-1px);
            text-decoration: none;
        }

        .card__icon {
            width: 1.25rem;
            height: 1.25rem;
        }

        .card__project {
            font-size: var(--font-size-small);
            font-weight: var(--font-weight-medium);
            margin: 0;
        }

        .card__project a {
            color: var(--text-muted);
            font-weight: var(--font-weight-medium);
            text-decoration: none;
            transition: color 0.2s;
        }

        .card__project a:hover {
            color: var(--accent-color);
            text-decoration: none;
        }

        .skip-link {
            position: absolute;
            left: -9999px;
            top: auto;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }

        .skip-link:focus {
            position: fixed;
            top: 0;
            left: 0;
            width: auto;
            height: auto;
            padding: 1rem;
            background: var(--bg-color);
            color: var(--link-color);
            z-index: 1000;
            text-decoration: underline;
        }

        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: none;
            border: 1px solid transparent;
            font-size: 1.125rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            width: 2.25rem;
            height: 2.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.5;
            transition: opacity 0.2s, border-color 0.2s;
            color: var(--text-color);
        }

        .theme-toggle:hover {
            opacity: 1;
            border-color: var(--border-color);
        }

        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.75rem;
                border-radius: 10px;
            }

            .card__links {
                gap: 1rem;
            }
        }

        @media (max-width: 320px) {
            .container {
                padding: 1.75rem 1.25rem;
                width: 95vw;
            }
        }
    </style>
    <script defer src="https://analytics.codequalitycheck.com/script.js" data-website-id="6676f7e7-9228-4d4b-8b5f-96585df84e9c"></script>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Switch to dark mode">🌙</button>
    <main id="main-content" class="container">
        <h1 class="card__name">Yuri Prezument</h1>
        <p class="card__title">Software Developer</p>
        <hr class="card__divider" aria-hidden="true">
        <p class="card__detail"><a href="#" id="years-toggle" class="card__years-link" role="button"></a></p>
        <p class="card__detail">Specializing in Python and backend systems.</p>
        <nav class="card__links" aria-label="Social and professional links">
            <a href="https://github.com/yprez" target="_blank" rel="noopener noreferrer" aria-label="GitHub profile">
                <svg class="card__icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">

            <a href="https://linkedin.com/in/yprez" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn profile">
                <svg class="card__icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>

            </a>
        </nav>
        <p class="card__project"><a href="https://codequalitycheck.com" target="_blank" rel="noopener noreferrer">codequalitycheck.com</a></p>
    </main>
    <script>
        (function() {
            var year = new Date().getFullYear();
            var professional = (year - 2011) + '+ years of professional experience';
            var programming = (year - 2001) + '+ years of programming experience';
            var showingProfessional = true;
            var yearsEl = document.getElementById('years-toggle');
            yearsEl.textContent = professional;
            yearsEl.setAttribute('aria-label', 'Showing professional experience. Click to see total programming experience');

            yearsEl.addEventListener('click', function(e) {
                e.preventDefault();
                showingProfessional = !showingProfessional;
                yearsEl.textContent = showingProfessional ? professional : programming;
                yearsEl.setAttribute('aria-label',
                    showingProfessional
                        ? 'Showing professional experience. Click to see total programming experience'
                        : 'Showing total programming experience. Click to see professional experience'
                );
            });

            var theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', theme);
            var themeBtn = document.getElementById('theme-toggle');
            themeBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
            themeBtn.setAttribute('aria-label', theme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');

            themeBtn.addEventListener('click', function() {
                var current = document.documentElement.getAttribute('data-theme');
                var next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                this.textContent = next === 'dark' ? '☀️' : '🌙';
                this.setAttribute('aria-label', next === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
            });
        })();
    </script>
</body>
</html>
